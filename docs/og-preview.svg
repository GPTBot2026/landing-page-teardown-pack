<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Landing Page Teardown Pack social preview</title>
  <desc id="desc">USD 20 AI-assisted landing page teardown with a short free preview, ranked fixes, headline options, and a CTA rewrite.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9f3e8"/>
      <stop offset="55%" stop-color="#f4efe5"/>
      <stop offset="100%" stop-color="#eadfca"/>
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="18%" r="50%">
      <stop offset="0%" stop-color="#d48f35" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d48f35" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="82%" cy="78%" r="42%">
      <stop offset="0%" stop-color="#9f3f24" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#9f3f24" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#43321d" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="68" width="1060" height="494" rx="30" fill="#fffaf3" fill-opacity="0.86" stroke="#cdbfa9"/>
  </g>

  <rect x="118" y="120" width="236" height="42" rx="21" fill="#f3dfc0"/>
  <text x="236" y="147" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="22" letter-spacing="2.8" fill="#9f3f24">USD 20 OFFER</text>

  <text x="118" y="246" font-family="Georgia, 'Palatino Linotype', serif" font-size="74" font-weight="700" fill="#1d1a16">Landing Page</text>
  <text x="118" y="328" font-family="Georgia, 'Palatino Linotype', serif" font-size="74" font-weight="700" fill="#1d1a16">Teardown Pack</text>

  <text x="118" y="390" font-family="Georgia, 'Palatino Linotype', serif" font-size="30" fill="#5f5448">
    AI-assisted review for one public page.
  </text>
  <text x="118" y="432" font-family="Georgia, 'Palatino Linotype', serif" font-size="30" fill="#5f5448">
    Short free preview first. Full teardown within 24 hours after payment.
  </text>

  <g transform="translate(750 138)">
    <rect width="286" height="330" rx="26" fill="#f7efe0" stroke="#dbc7aa"/>
    <rect x="28" y="30" width="120" height="14" rx="7" fill="#c46d3d" fill-opacity="0.85"/>
    <rect x="28" y="62" width="200" height="12" rx="6" fill="#d9c7aa"/>
    <rect x="28" y="92" width="228" height="12" rx="6" fill="#e3d5c0"/>
    <rect x="28" y="136" width="230" height="64" rx="18" fill="#fffaf3" stroke="#dbc7aa"/>
    <text x="48" y="166" font-family="Georgia, 'Palatino Linotype', serif" font-size="18" fill="#9f3f24">Free preview</text>
    <text x="48" y="192" font-family="Georgia, 'Palatino Linotype', serif" font-size="16" fill="#5f5448">Judge fit before paying.</text>

    <rect x="28" y="220" width="230" height="78" rx="18" fill="#f0dcc0"/>
    <text x="48" y="252" font-family="Georgia, 'Palatino Linotype', serif" font-size="18" fill="#1d1a16">Includes</text>
    <text x="48" y="278" font-family="Georgia, 'Palatino Linotype', serif" font-size="16" fill="#5f5448">Ranked fixes, headline</text>
    <text x="48" y="300" font-family="Georgia, 'Palatino Linotype', serif" font-size="16" fill="#5f5448">options, and CTA rewrite.</text>
  </g>

  <g transform="translate(118 492)">
    <rect width="240" height="18" rx="9" fill="#9f3f24"/>
    <rect x="260" width="168" height="18" rx="9" fill="#d48f35"/>
    <rect x="448" width="128" height="18" rx="9" fill="#d9c7aa"/>
  </g>
